<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giornale Lavori - GeomFazio</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f3; margin: 0; padding: 15px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 600px; margin: auto; box-sizing: border-box; }
        h1 { color: #2c3e50; font-size: 22px; text-align: center; border-bottom: 3px solid #3498db; padding-bottom: 10px; }
        h2 { color: #2980b9; font-size: 16px; margin-top: 20px; text-transform: uppercase; background: #f8f9fa; padding: 5px; }
        label { display: block; margin: 12px 0 5px; font-weight: bold; color: #34495e; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 2px solid #dfe6e9; border-radius: 8px; font-size: 15px; box-sizing: border-box; }
        .btn-save { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 8px; font-size: 17px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        #appContent { display: none; }
        .company-tag { display: inline-block; background: #3498db; color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>

    <div id="loginCard" class="card" style="text-align: center;">
        <h1>Accesso Gestionale</h1>
        <input type="password" id="pinInput" placeholder="Inserisci PIN" inputmode="numeric">
        <button class="btn-save" onclick="validaPin()">ENTRA</button>
    </div>

    <div id="appContent" class="card">
        <h1>GIORNALE DEI LAVORI</h1>
        
        <form id="giornaleForm">
            <h2>📅 Periodo e Data</h2>
            <label>Data Sopralluogo:</label>
            <input type="date" id="dataCantiere">

            <div class="company-tag">Ditta Esecutrice</div>
            <h2 style="margin-top:5px;">SIRIMED S.r.l.</h2>
            <label>Qualifica Staff/Maestranza:</label>
            <select id="staffSirimed">
                <option value="">-- Seleziona --</option>
                <option value="Responsabile di Commessa">Responsabile di Commessa</option>
                <option value="Geometra">Geometra</option>
                <option value="Capocantiere">Capocantiere</option>
                <option value="Operaio Edile">Operaio Edile</option>
                <option value="Impiantista Elettrico">Impiantista Elettrico</option>
                <option value="Idraulico">Idraulico</option>
                <option value="Tubista">Tubista</option>
            </select>

            <div class="company-tag" style="background: #e67e22;">Subappalto / Affidatario</div>
            <h2 style="margin-top:5px;">Impresa Esterna</h2>
            <label>Nome Società / Ditta:</label>
            <input type="text" id="dittaSub" placeholder="Es: Rossi Impianti S.r.l.">
            
            <label>Specializzazione:</label>
            <select id="mansioneSub">
                <option value="">-- Seleziona Specializzazione --</option>
                <option value="Opere Edili">Opere Edili</option>
                <option value="Impianti Elettrici">Impianti Elettrici</option>
                <option value="Impianti Idraulici">Impianti Idraulici</option>
                <option value="Lattoneria / Tubazioni">Lattoneria / Tubazioni</option>
                <option value="Noleggio / Mezzi">Noleggio / Mezzi</option>
            </select>

            <h2>📝 Dettaglio Lavori</h2>
            <label>Descrizione Lavorazioni:</label>
            <textarea id="note" rows="4" placeholder="Descrivi le attività svolte oggi..."></textarea>

            <button type="button" class="btn-save" onclick="inviaDati()">SALVA E GENERA RIEPILOGO</button>
            <button type="button" onclick="location.reload()" style="width:100%; background:#95a5a6; color:white; border:none; padding:10px; margin-top:10px; border-radius:8px;">ESCI</button>
        </form>
    </div>

    <script>
        // Imposta data odierna come predefinita
        document.getElementById('dataCantiere').valueAsDate = new Date();

        function validaPin() {
            if (document.getElementById('pinInput').value === "9731") {
                document.getElementById('loginCard').style.display = 'none';
                document.getElementById('appContent').style.display = 'block';
            } else {
                alert("PIN Errato!");
            }
        }

        function inviaDati() {
            const data = document.getElementById('dataCantiere').value;
            const sirimed = document.getElementById('staffSirimed').value;
            const ditta = document.getElementById('dittaSub').value;
            const mansione = document.getElementById('mansioneSub').value;
            const note = document.getElementById('note').value;

            let riepilogo = "RIEPILOGO GIORNALE DEL " + data + "\n\n";
            if(sirimed) riepilogo += "SIRIMED: " + sirimed + "\n";
            if(ditta) riepilogo += "DITTA: " + ditta.toUpperCase() + " (" + mansione + ")\n";
            riepilogo += "\nDESCRIZIONE:\n" + note;

            alert(riepilogo);
            // Qui i dati sono pronti per essere inviati al database o PDF
        }
    </script>
</body>
</html>
