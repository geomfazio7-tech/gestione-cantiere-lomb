<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giornale Lavori PRO - GeomFazio</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f3; margin: 0; padding: 15px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 550px; margin: auto; box-sizing: border-box; }
        h1 { color: #2c3e50; font-size: 22px; text-align: center; margin-bottom: 20px; border-bottom: 3px solid #3498db; padding-bottom: 10px; }
        h2 { color: #2980b9; font-size: 16px; margin-top: 25px; text-transform: uppercase; letter-spacing: 1px; }
        label { display: block; margin: 12px 0 5px; font-weight: bold; color: #34495e; font-size: 14px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 2px solid #dfe6e9; border-radius: 8px; font-size: 15px; box-sizing: border-box; background: #fdfdfd; }
        input:focus, select:focus { border-color: #3498db; outline: none; background: #fff; }
        .btn-save { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 8px; font-size: 17px; font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-exit { width: 100%; padding: 12px; background: #95a5a6; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; margin-top: 10px; }
        #appContent { display: none; }
        .company-tag { display: inline-block; background: #3498db; color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="loginCard" class="card" style="text-align: center;">
        <h1>Accesso Gestionale</h1>
        <input type="password" id="pinInput" placeholder="Inserisci PIN" inputmode="numeric">
        <button class="btn-save" onclick="validaPin()">ENTRA</button>
    </div>

    <div id="appContent" class="card">
        <h1>GIORNALE DEI LAVORI</h1>
        
        <form id="giornaleForm">
            <div class="company-tag">Ditta Esecutrice</div>
            <h2 style="margin-top:0;">SIRIMED S.r.l.</h2>
            
            <label>Qualifica Staff/Maestranza:</label>
            <select id="staffSirimed">
                <option value="">-- Seleziona --</option>
                <option value="Responsabile di Commessa">Responsabile di Commessa</option>
                <option value="Geometra">Geometra</option>
                <option value="Capocantiere">Capocantiere</option>
                <option value="Operaio Edile">Operaio Edile</option>
                <option value="Impiantista Elettrico">Impiantista Elettrico</option>
                <option value="Idraulico">Idraulico</option>
                <option value="Tubista">Tubista</option>
            </select>

            <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

            <div class="company-tag" style="background: #e67e22;">Subappalto / Affidatario</div>
            <h2 style="margin-top:0;">Impresa Esterna</h2>

            <label>Nome Società / Ditta:</label>
            <input type="text" id="dittaSub" placeholder="Es: Rossi Impianti S.r.l.">
            
            <label>Specializzazione:</label>
            <select id="mansioneSub">
                <option value="">-- Seleziona Specializzazione --</option>
                <option value="Opere Edili">Opere Edili</option>
                <option value="Impianti Elettrici">Impianti Elettrici</option>
                <option value="Impianti Idraulici">Impianti Idraulici</option>
                <option value="Lattoneria / Tubazioni">Lattoneria / Tubazioni</option>
                <option value="Noleggio / Mezzi">Noleggio / Mezzi</option>
                <option value="Altro">Altro (specificare nelle note)</option>
            </select>

            <label>Descrizione Lavorazioni Odierne:</label>
            <input type="text" id="note" placeholder="Esempio: Posa tubazioni piano primo">

            <button type="button" class="btn-save" onclick="inviaDati()">SALVA NEL GIORNALE</button>
            <button type="button" class="btn-exit" onclick="location.reload()">CHIUDI SESSIONE</button>
        </form>
    </div>

    <script>
        function validaPin() {
            if (document.getElementById('pinInput').value === "9731") {
                document.getElementById('loginCard').style.display = 'none';
                document.getElementById('appContent').style.display = 'block';
            } else {
                alert("PIN Errato!");
            }
        }

        function inviaDati() {
            const sirimed = document.getElementById('staffSirimed').value;
            const ditta = document.getElementById('dittaSub').value;
            const mansione = document.getElementById('mansioneSub').value;
            const note = document.getElementById('note').value;

            // Logica di identificazione per il futuro PDF
            let riepilogo = "Dati acquisiti per il Giornale:\n\n";
            if(sirimed) riepilogo += "- SIRIMED S.r.l.: " + sirimed + "\n";
            if(ditta) riepilogo += "- " + ditta.toUpperCase() + ": " + mansione + "\n";
            riepilogo += "- Note: " + note;

            alert(riepilogo);
            // Qui in futuro collegheremo il database reale (Firebase)
            document.getElementById('giornaleForm').reset();
        }
    </script>
</body>
</html>
