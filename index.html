<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giornale Lavori - GeomFazio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f3; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        h1 { color: #2c3e50; margin-bottom: 20px; font-size: 24px; }
        h3 { font-size: 16px; color: #3498db; margin-top: 20px; text-align: left; border-bottom: 1px solid #ddd; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #3498db; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: background 0.3s; margin-top: 10px; }
        button:hover { background: #2980b9; }
        #appContent { display: none; }
        .success-msg { color: #27ae60; font-weight: bold; }
        .checklist { text-align: left; background: #f9f9f9; padding: 10px; border-radius: 8px; max-height: 150px; overflow-y: auto; }
        .item-check { display: flex; align-items: center; margin-bottom: 5px; font-size: 14px; }
        .item-check input { width: auto; margin-right: 10px; margin: 0 10px 0 0; }
        .thumb-container { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
        .thumb { width: 60px; height: 60px; object-fit: cover; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="loginCard" class="card">
        <h1>Accesso Cantiere</h1>
        <p>Inserisci il PIN per operare</p>
        <input type="password" id="pinInput" placeholder="****" inputmode="numeric">
        <button onclick="validaPin()">ACCEDI</button>
    </div>

    <div id="appContent" class="card">
        <h1 class="success-msg">✅ Sistema Attivo</h1>
        
        <input type="date" id="dataGiorno">

        <h3>1. Configura Commessa</h3>
        <input type="text" id="nomeDitta" placeholder="Nome Impresa (es. SIRIMED)">
        <input type="text" id="nomeOperaio" placeholder="Nome Operaio e Ruolo">
        <button onclick="aggiungiMaestranza()" style="font-size:14px; padding:10px; background:#27ae60;">Aggiungi a Elenco</button>

        <h3>2. Personale Presente</h3>
        <div id="listaCheck" class="checklist">
            <p style="color:#999; font-size:12px;">Nessun nome inserito sopra.</p>
        </div>

        <h3>3. Foto Cantiere</h3>
        <input type="file" id="fotoInput" accept="image/*" capture="camera" multiple onchange="anteprimaFoto()">
        <div id="thumbPreview" class="thumb-container"></div>

        <h3>4. Note Lavorazioni</h3>
        <textarea id="noteLavoro" placeholder="Descrizione attività..."></textarea>

        <hr>
        <button onclick="generaPDF()">GENERA PDF GIORNALE</button>
        <button onclick="scaricaArchivio()" style="background:#e67e22;">SCARICA TUTTI I GIORNALI (.csv)</button>
        <button onclick="location.reload()" style="background:#95a5a6;">Esci</button>
    </div>

    <script>
        let maestranze = JSON.parse(localStorage.getItem('fazio_maestranze')) || [];
        let archivio = JSON.parse(localStorage.getItem('fazio_archivio')) || [];
        let fotoBase64 = [];

        function validaPin() {
            if (document.getElementById('pinInput').value === "9731") {
                document.getElementById('loginCard').style.display = 'none';
                document.getElementById('appContent').style.display = 'block';
                document.getElementById('dataGiorno').valueAsDate = new Date();
                aggiornaChecklist();
            } else { alert("PIN Errato!"); }
        }

        function aggiungiMaestranza() {
            const ditta = document.getElementById('nomeDitta').value;
            const nome = document.getElementById('nomeOperaio').value;
            if(ditta && nome) {
                maestranze.push({ ditta, nome });
                localStorage.setItem('fazio_maestranze', JSON.stringify(maestranze));
                aggiornaChecklist();
                document.getElementById('nomeOperaio').value = "";
            }
        }

        function aggiornaChecklist() {
            const cont = document.getElementById('listaCheck');
            if(maestranze.length === 0) return;
            cont.innerHTML = "";
            maestranze.forEach((m, i) => {
                cont.innerHTML += `<div class="item-check"><input type="checkbox" class="op-check" value="${m.nome} (${m.ditta})"> ${m.nome} <small style="margin-left:5px; color:#666;">[${m.ditta}]</small></div>`;
            });
        }

        function anteprimaFoto() {
            const files = document.getElementById('fotoInput').files;
            const preview = document.getElementById('thumbPreview');
            preview.innerHTML = "";
            fotoBase64 = [];
            for (let file of files) {
                let reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.createElement("img");
                    img.src = e.target.result;
                    img.className = "thumb";
                    preview.appendChild(img);
                    fotoBase64.push(e.target.result);
                };
                reader.readAsDataURL(file);
            }
        }

        function generaPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const data = document.getElementById('dataGiorno').value;
            const note = document.getElementById('noteLavoro').value;
            const selezionati = Array.from(document.querySelectorAll('.op-check:checked')).map(c => c.value);

            doc.text(`GIORNALE DI CANTIERE - DATA: ${data}`, 10, 10);
            doc.text("PERSONALE PRESENTE:", 10, 20);
            let y = 30;
            selezionati.forEach(p => { doc.text(`- ${p}`, 15, y); y += 10; });
            doc.text("NOTE LAVORI:", 10, y + 10);
            doc.text(note, 10, y + 20);

            // Salvataggio in archivio interno
            archivio.push({ data, selezionati, note });
            localStorage.setItem('fazio_archivio', JSON.stringify(archivio));

            doc.save(`Giornale_${data}.pdf`);
            alert("PDF Generato e salvato in archivio!");
        }

        function scaricaArchivio() {
            let csv = "Data;Presenti;Note\n";
            archivio.forEach(g => {
                csv += `${g.data};${g.selezionati.join(",")};${g.note}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'archivio_giornali.csv';
            a.click();
        }
    </script>
</body>
</html>
