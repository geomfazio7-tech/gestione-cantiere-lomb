<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CantieriCloud Pro - Lombardia</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    
    <style>
        :root { --primary: #004085; --accent: #007bff; }
        body { background: #e9ecef; font-family: 'Segoe UI', sans-serif; }
        section { display: none; } .active-section { display: block; }
        .card { border-radius: 12px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* CALENDARIO FLUIDO CON COLORI DISTINTI */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; background: #dee2e6; padding: 2px; border-radius: 10px; }
        .cal-day { min-height: 60px; background: #fff; padding: 5px; cursor: pointer; font-size: 0.8rem; display: flex; flex-direction: column; }
        .cal-header { font-weight: bold; text-align: center; font-size: 0.7rem; padding: 5px 0; background: #f8f9fa; }
        
        .cal-today { border: 2px solid var(--accent) !important; background: #e7f1ff !important; font-weight: bold; }
        .cal-past { background: #f1f3f5; color: #adb5bd; }
        .cal-future { background: #fff; color: #000; }

        /* INPUT */
        #g-lavorazioni[readonly] { background: #f8f9fa; color: #6c757d; }
        .sig-box { border: 1px solid #ccc; border-radius: 8px; height: 120px; background: white; }
        canvas { width: 100%; height: 100%; touch-action: none; }
        .worker-chip { display: inline-block; padding: 3px 8px; border-radius: 15px; font-size: 0.7rem; border: 1px solid #ccc; margin: 2px; cursor: pointer; background: white; }
        .worker-chip.selected { background: var(--accent); color: white; border-color: var(--accent); }
        #save-status { position: fixed; top: 10px; right: 10px; background: #198754; color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.7rem; display: none; z-index: 2000; }
        .photo-thumb { width: 60px; height: 60px; object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body>

<div id="save-status">Sincronizzato Cloud</div>

<div class="container py-3">
    <div id="auth-section" class="card p-4 mx-auto mt-5" style="max-width: 400px;">
        <h3 class="text-center text-primary fw-bold">CantieriCloud</h3>
        <input type="email" id="log-email" class="form-control mb-2" placeholder="Email">
        <input type="password" id="log-pw" class="form-control mb-3" placeholder="Password">
        <button class="btn btn-primary w-100" onclick="handleLogin()">Accedi</button>
    </div>

    <div id="pin-section" class="text-center mt-5" style="display:none;">
        <div class="card p-5 mx-auto" style="max-width: 320px;">
            <input type="password" id="pin-input" class="form-control text-center fs-1 mb-3" maxlength="4" placeholder="••••">
            <button class="btn btn-dark w-100" onclick="checkPin()">Sblocca</button>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <header class="d-flex justify-content-between mb-3 bg-white p-3 rounded shadow-sm">
            <h5 class="fw-bold m-0 text-primary">Gestionale Lombardia</h5>
            <button class="btn btn-sm btn-outline-danger" onclick="location.reload()">Esci</button>
        </header>

        <section id="section-list" class="active-section">
            <div class="d-flex justify-content-between mb-3">
                <h6 class="fw-bold">COMMESSE ATTIVE</h6>
                <button class="btn btn-primary btn-sm" onclick="openModaleNuovo()">+ Nuova</button>
            </div>
            <div id="cantieri-grid" class="row g-3"></div>
        </section>

        <section id="section-calendar">
            <div class="card p-3">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <button class="btn btn-sm btn-secondary" onclick="showSection('section-list')">Indietro</button>
                    <h5 id="cal-title" class="fw-bold m-0 text-primary"></h5>
                    <button class="btn btn-sm btn-warning" onclick="editCurrentCommessa()">⚙️</button>
                </div>
                <div class="text-center mb-2">
                    <button class="btn btn-link btn-sm" onclick="changeMonth(-1)">◀</button>
                    <span id="month-display" class="fw-bold text-uppercase mx-3"></span>
                    <button class="btn btn-link btn-sm" onclick="changeMonth(1)">▶</button>
                </div>
                <div id="calendar-days" class="calendar-grid"></div>
            </div>
        </section>

        <section id="section-giornale">
            <div class="card p-3">
                <div class="d-flex justify-content-between border-bottom pb-2 mb-3">
                    <h6 id="g-date-label" class="fw-bold m-0 text-primary"></h6>
                    <button class="btn-close" onclick="showSection('section-calendar')"></button>
                </div>
                
                <div class="row">
                    <div class="col-md-4 border-end">
                        <label class="fw-bold small">METEO E TEMP.</label>
                        <div class="d-flex gap-1 mb-3">
                            <select id="g-meteo" class="form-select form-select-sm" onchange="autoSave()">
                                <option value="Soleggiato">☀️ Soleggiato</option>
                                <option value="Nuvoloso">☁️ Nuvoloso</option>
                                <option value="Coperto">🌫️ Coperto</option>
                                <option value="Pioggia">🌧️ Pioggia</option>
                                <option value="Vento">💨 Vento</option>
                                <option value="Neve">❄️ Neve</option>
                            </select>
                            <input type="number" id="g-temp" class="form-control form-control-sm" style="width:70px" placeholder="°C" onchange="autoSave()">
                        </div>
                        
                        <label class="fw-bold small">FOTO</label>
                        <input type="file" id="photo-in" multiple accept="image/*" class="d-none" onchange="handlePhotos(this)">
                        <button class="btn btn-sm btn-outline-primary w-100 mb-2" onclick="$('#photo-in').click()">+ Foto</button>
                        <div id="photo-box" class="d-flex flex-wrap gap-2 mb-3"></div>

                        <label class="fw-bold small">DITTE E PRESENZE</label>
                        <select id="sel-ditta" class="form-select form-select-sm mb-2" onchange="addDittaG()"></select>
                        <div id="ditte-presenze"></div>
                    </div>

                    <div class="col-md-4 border-end">
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <label class="fw-bold small">LAVORAZIONI SVOLTE</label>
                            <button id="btn-lock" class="btn btn-xs btn-warning py-0 px-2" style="font-size:0.7rem" onclick="toggleLock()">MODIFICA</button>
                        </div>
                        <textarea id="g-lavorazioni" class="form-control mb-3" rows="8" readonly></textarea>
                        
                        <label class="fw-bold small">NOTE INTERNE</label>
                        <textarea id="g-memo" class="form-control mb-3" rows="2" onchange="autoSave()"></textarea>

                        <label class="fw-bold small">FIRME DIGITALI</label>
                        <select id="sel-firma" class="form-select form-select-sm mb-2" onchange="initSig()">
                            <option value="">Seleziona chi firma...</option>
                            <option value="DL">Direttore Lavori</option>
                            <option value="CSE">Coord. Sicurezza</option>
                            <option value="IMP">Impresa Affidataria</option>
                        </select>
                        <div id="sig-container" style="display:none">
                            <div class="sig-box mb-2"><canvas id="sig-canvas"></canvas></div>
                            <button class="btn btn-sm btn-success w-100" onclick="saveSig()">Salva Firma</button>
                        </div>
                        <button class="btn btn-danger w-100 fw-bold mt-4" onclick="generatePDF()">GENERA PDF GIORNALE</button>
                    </div>

                    <div class="col-md-4">
                        <label class="fw-bold small">TASK / EISENHOWER</label>
                        <div class="input-group input-group-sm mb-2">
                            <input type="text" id="task-in" class="form-control" placeholder="Nuovo task...">
                            <select id="task-q" class="form-select" style="max-width:60px"><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option></select>
                            <button class="btn btn-primary" onclick="addTask()">+</button>
                        </div>
                        <div class="row g-1">
                            <div class="col-6"><div class="quadrant q-1" id="q1"></div></div>
                            <div class="col-6"><div class="quadrant q-2" id="q2"></div></div>
                            <div class="col-6"><div class="quadrant q-3" id="q3"></div></div>
                            <div class="col-6"><div class="quadrant q-4" id="q4"></div></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</div>

<div class="modal fade" id="modalC" tabindex="-1"><div class="modal-dialog modal-lg"><div class="modal-content"><div class="modal-body">
    <h5 class="fw-bold">Configurazione Commessa</h5>
    <div class="row g-2 mb-3">
        <div class="col-6"><label class="small">Nome Cantiere</label><input type="text" id="c-nome" class="form-control"></div>
        <div class="col-6"><label class="small">Oggetto</label><input type="text" id="c-oggetto" class="form-control"></div>
        <div class="col-6"><label class="small">CIG</label><input type="text" id="c-cig" class="form-control"></div>
        <div class="col-6"><label class="small">CUP</label><input type="text" id="c-cup" class="form-control"></div>
        <div class="col-6"><label class="small">Direttore Lavori</label><input type="text" id="c-dl" class="form-control"></div>
        <div class="col-6"><label class="small">Assistente DL</label><input type="text" id="c-adl" class="form-control"></div>
        <div class="col-4"><label class="small">CSE</label><input type="text" id="c-cse" class="form-control"></div>
        <div class="col-4"><label class="small">RUP</label><input type="text" id="c-rup" class="form-control"></div>
        <div class="col-4"><label class="small">Assistente RUP</label><input type="text" id="c-arup" class="form-control"></div>
    </div>
    <label class="fw-bold small">Anagrafica Imprese</label>
    <div id="ana-list" class="mb-2"></div>
    <button class="btn btn-sm btn-outline-primary" onclick="addAnaDitta()">+ Ditta</button>
    <button class="btn btn-primary w-100 mt-4" onclick="saveC()">SALVA COMMESSA</button>
</div></div></div></div>

<script>
const firebaseConfig = { apiKey: "AIzaSyDCtNOTx-IwS3773jypKl-mW3E51cDxuig", authDomain: "gestionecantierilombardia.firebaseapp.com", projectId: "gestionecantierilombardia", storageBucket: "gestionecantierilombardia.firebasestorage.app", messagingSenderId: "341647926497", appId: "1:341647926497:web:e9eb22c39ded8ea93e83a0" };
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth(), db = firebase.firestore();
let userData = { cantieri: [] }, cIdx = -1, activeDate = "", sigPad, currentMonth = new Date(), tempAna = [];

auth.onAuthStateChanged(user => { if(user) { $("#auth-section").hide(); $("#pin-section").show(); } });
function handleLogin() { auth.signInWithEmailAndPassword($('#log-email').val(), $('#log-pw').val()); }
function checkPin() { if($('#pin-input').val()==="9731") { $("#pin-section").hide(); $("#main-app").show(); loadDB(); } else alert("PIN Errato"); }

function loadDB() {
    db.collection('users').doc('archivio_condiviso').get().then(doc => {
        userData.cantieri = doc.exists ? doc.data().cantieri : [];
        renderList();
    });
}

function renderList() {
    let h = ''; userData.cantieri.forEach((c, i) => {
        h += `<div class="col-md-4"><div class="card p-3" onclick="openC(${i})" style="cursor:pointer">
            <h6 class="fw-bold m-0 text-primary">${c.nome}</h6><small>CIG: ${c.cig || '-'}</small>
        </div></div>`;
    });
    $('#cantieri-grid').html(h);
}

function openC(i) { cIdx = i; showSection('section-calendar'); $('#cal-title').text(userData.cantieri[i].nome); renderCal(); }
function showSection(id) { $('section').removeClass('active-section'); $('#'+id).addClass('active-section'); window.scrollTo(0,0); }
function changeMonth(dir) { currentMonth.setMonth(currentMonth.getMonth()+dir); renderCal(); }

function renderCal() {
    const y = currentMonth.getFullYear(), m = currentMonth.getMonth();
    const today = new Date().setHours(0,0,0,0);
    $('#month-display').text(new Intl.DateTimeFormat('it-IT', {month:'long', year:'numeric'}).format(currentMonth));
    const days = new Date(y, m+1, 0).getDate(), start = (new Date(y, m, 1).getDay() + 6) % 7;
    let h = ''; ['L','M','M','G','V','S','D'].forEach(d => h += `<div class="cal-header">${d}</div>`);
    for(let i=0; i<start; i++) h += '<div></div>';
    for(let d=1; d<=days; d++) {
        const check = new Date(y, m, d).setHours(0,0,0,0);
        let cls = "cal-future";
        if(check < today) cls = "cal-past";
        if(check === today) cls = "cal-today";
        const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        h += `<div class="cal-day ${cls}" onclick="openG('${ds}')"><b>${d}</b></div>`;
    }
    $('#calendar-days').html(h);
}

function openG(ds) {
    activeDate = ds; const c = userData.cantieri[cIdx];
    $('#g-date-label').text("GIORNALE DEL " + ds.split('-').reverse().join('/'));
    const g = (c.giornali || {})[ds] || {};
    $('#g-meteo').val(g.meteo || 'Soleggiato');
    $('#g-temp').val(g.temp || '');
    $('#g-lavorazioni').val(g.lavorazioni || '').prop('readonly', true);
    $('#btn-lock').text('MODIFICA').addClass('btn-warning').removeClass('btn-success');
    $('#g-memo').val(g.memo || '');
    let sel = $('#sel-ditta').empty().append('<option value="">+ Aggiungi Ditta</option>');
    (c.anagraficaDitte || []).forEach(d => sel.append(`<option value="${d.nome}">${d.nome}</option>`));
    showSection('section-giornale');
    renderPresenze(); renderPhotos(); renderTasks();
    $('#sig-container').hide(); $('#sel-firma').val('');
}

function toggleLock() {
    const field = $('#g-lavorazioni');
    const isLocked = field.prop('readonly');
    if(isLocked) {
        field.prop('readonly', false).focus();
        $('#btn-lock').text('SALVA').addClass('btn-success').removeClass('btn-warning');
    } else {
        field.prop('readonly', true);
        $('#btn-lock').text('MODIFICA').addClass('btn-warning').removeClass('btn-success');
        autoSave();
    }
}

function autoSave() {
    $('#save-status').fadeIn();
    if(!userData.cantieri[cIdx].giornali) userData.cantieri[cIdx].giornali = {};
    if(!userData.cantieri[cIdx].giornali[activeDate]) userData.cantieri[cIdx].giornali[activeDate] = {};
    const g = userData.cantieri[cIdx].giornali[activeDate];
    g.meteo = $('#g-meteo').val(); g.temp = $('#g-temp').val();
    g.lavorazioni = $('#g-lavorazioni').val(); g.memo = $('#g-memo').val();
    db.collection('users').doc('archivio_condiviso').set({cantieri: userData.cantieri})
      .then(() => setTimeout(() => $('#save-status').fadeOut(), 1000));
}

function addDittaG() {
    const n = $('#sel-ditta').val(); if(!n) return;
    let g = userData.cantieri[cIdx].giornali[activeDate] || (userData.cantieri[cIdx].giornali[activeDate] = {});
    if(!g.ditteVisibili) g.ditteVisibili = [];
    if(!g.ditteVisibili.includes(n)) g.ditteVisibili.push(n);
    autoSave(); renderPresenze();
}

function renderPresenze() {
    const c = userData.cantieri[cIdx], g = c.giornali[activeDate] || {};
    let h = '';
    (g.ditteVisibili || []).forEach(nome => {
        const d = (c.anagraficaDitte || []).find(x => x.nome === nome);
        if(d) {
            h += `<div class="bg-light p-2 rounded mb-2 border"><div class="d-flex justify-content-between"><b>${nome}</b><button class="btn btn-link text-danger btn-sm p-0" onclick="remDittaG('${nome}')">x</button></div>`;
            (d.operai || []).forEach(o => {
                const id = `${o} (${nome})`;
                const sel = (g.presenti || []).includes(id) ? 'selected' : '';
                h += `<span class="worker-chip ${sel}" onclick="toggleW('${id}')">${o}</span>`;
            });
            h += '</div>';
        }
    });
    $('#ditte-presenze').html(h);
}

function toggleW(id) {
    let g = userData.cantieri[cIdx].giornali[activeDate];
    if(!g.presenti) g.presenti = [];
    g.presenti = g.presenti.includes(id) ? g.presenti.filter(x => x!==id) : [...g.presenti, id];
    autoSave(); renderPresenze();
}

function remDittaG(n) { userData.cantieri[cIdx].giornali[activeDate].ditteVisibili = userData.cantieri[cIdx].giornali[activeDate].ditteVisibili.filter(x => x!==n); autoSave(); renderPresenze(); }

function initSig() {
    const r = $('#sel-firma').val(); if(!r) return $('#sig-container').hide();
    $('#sig-container').show();
    const cvs = document.getElementById('sig-canvas');
    cvs.width = cvs.offsetWidth; cvs.height = cvs.offsetHeight;
    sigPad = new SignaturePad(cvs);
    const g = userData.cantieri[cIdx].giornali[activeDate] || {};
    if(g['firma_'+r]) sigPad.fromDataURL(g['firma_'+r]);
}

function saveSig() {
    const r = $('#sel-firma').val();
    userData.cantieri[cIdx].giornali[activeDate]['firma_'+r] = sigPad.toDataURL();
    autoSave(); alert("Firma salvata.");
}

function handlePhotos(inpt) {
    for(let f of inpt.files) {
        const r = new FileReader();
        r.onload = (e) => {
            const img = new Image(); img.src = e.target.result;
            img.onload = () => {
                const c = document.createElement('canvas'); const m = 800; const s = m/img.width;
                c.width = m; c.height = img.height*s;
                c.getContext('2d').drawImage(img,0,0,c.width,c.height);
                if(!userData.cantieri[cIdx].giornali[activeDate].photos) userData.cantieri[cIdx].giornali[activeDate].photos = [];
                userData.cantieri[cIdx].giornali[activeDate].photos.push(c.toDataURL('image/jpeg', 0.6));
                autoSave(); renderPhotos();
            }
        }; r.readAsDataURL(f);
    }
}
function renderPhotos() {
    const g = userData.cantieri[cIdx].giornali[activeDate] || {};
    $('#photo-box').empty();
    (g.photos || []).forEach((p, i) => $('#photo-box').append(`<img src="${p}" class="photo-thumb" onclick="delPh(${i})">`));
}
function delPh(i) { if(confirm("Elimina foto?")) { userData.cantieri[cIdx].giornali[activeDate].photos.splice(i,1); autoSave(); renderPhotos(); } }

function addTask() {
    const t = $('#task-in').val(); if(!t) return;
    if(!userData.cantieri[cIdx].tasks) userData.cantieri[cIdx].tasks = [];
    userData.cantieri[cIdx].tasks.push({id:Date.now(), text:t, q:$('#task-q').val()});
    $('#task-in').val(''); autoSave(); renderTasks();
}
function renderTasks() {
    $('.quadrant').empty();
    (userData.cantieri[cIdx].tasks || []).forEach(t => $(`#q${t.q}`).append(`<div class="task-item bg-white p-1 mb-1 rounded shadow-sm small" onclick="delT(${t.id})">${t.text}</div>`));
}
function delT(id) { if(confirm("Elimina task?")) { userData.cantieri[cIdx].tasks = userData.cantieri[cIdx].tasks.filter(x => x.id!==id); autoSave(); renderTasks(); } }

function openModaleNuovo() { cIdx = -1; tempAna = []; $('#modalC input').val(''); $('#ana-list').empty(); $('#modalC').modal('show'); }
function editCurrentCommessa() {
    const c = userData.cantieri[cIdx];
    $('#c-nome').val(c.nome); $('#c-oggetto').val(c.oggetto); $('#c-cig').val(c.cig); $('#c-cup').val(c.cup);
    $('#c-dl').val(c.dl); $('#c-adl').val(c.adl); $('#c-cse').val(c.cse); $('#c-rup').val(c.rup); $('#c-arup').val(c.arup);
    tempAna = JSON.parse(JSON.stringify(c.anagraficaDitte || [])); renderAna();
    $('#modalC').modal('show');
}
function addAnaDitta() { const n = prompt("Nome Ditta:"); if(n) { tempAna.push({nome:n.toUpperCase(), operai:[]}); renderAna(); } }
function addAnaW(i) { const n = prompt("Operaio:"); if(n) { tempAna[i].operai.push(n.toUpperCase()); renderAna(); } }
function renderAna() {
    let h = ''; tempAna.forEach((d, i) => {
        h += `<div class="p-2 border rounded mb-2 small"><b>${d.nome}</b> <button class="btn btn-link btn-sm py-0" onclick="addAnaW(${i})">+ operaio</button><br>`;
        (d.operai || []).forEach(o => h += `<span class="badge bg-secondary me-1">${o}</span>`);
        h += '</div>';
    });
    $('#ana-list').html(h);
}
function saveC() {
    const d = { nome: $('#c-nome').val().toUpperCase(), oggetto: $('#c-oggetto').val(), cig: $('#c-cig').val(), cup: $('#c-cup').val(), dl: $('#c-dl').val(), adl: $('#c-adl').val(), cse: $('#c-cse').val(), rup: $('#c-rup').val(), arup: $('#c-arup').val(), anagraficaDitte: tempAna, giornali: cIdx===-1 ? {} : (userData.cantieri[cIdx].giornali || {}), tasks: cIdx===-1 ? [] : (userData.cantieri[cIdx].tasks || []) };
    if(cIdx===-1) userData.cantieri.push(d); else userData.cantieri[cIdx] = d;
    db.collection('users').doc('archivio_condiviso').set({cantieri: userData.cantieri}).then(() => { $('#modalC').modal('hide'); renderList(); });
}

// PDF CON BOX FIRME E DETTAGLI COMPLETI
async function generatePDF() {
    const { jsPDF } = window.jspdf; const doc = new jsPDF();
    const c = userData.cantieri[cIdx], g = c.giornali[activeDate] || {};
    
    doc.setFillColor(0, 64, 133); doc.rect(0, 0, 210, 35, 'F');
    doc.setTextColor(255); doc.setFontSize(20); doc.text("GIORNALE DI CANTIERE", 105, 18, { align: 'center' });
    doc.setFontSize(10); doc.text(`Data: ${activeDate.split('-').reverse().join('/')} | Meteo: ${g.meteo || '-'} ${g.temp || ''}°C`, 105, 28, { align: 'center' });

    doc.setTextColor(0); doc.setFont(undefined, 'bold'); doc.setFontSize(11);
    let y = 45; doc.text("DETTAGLI COMMESSA", 15, y);
    doc.setDrawColor(0, 64, 133); doc.line(15, y+2, 195, y+2);
    
    y += 10; doc.setFontSize(9);
    doc.text("Cantiere:", 15, y); doc.setFont(undefined, 'normal'); doc.text(c.nome || "-", 45, y);
    y += 6; doc.setFont(undefined, 'bold'); doc.text("Oggetto:", 15, y); doc.setFont(undefined, 'normal'); doc.text(doc.splitTextToSize(c.oggetto || "-", 150), 45, y);
    y += 12; doc.setFont(undefined, 'bold'); doc.text("CIG:", 15, y); doc.setFont(undefined, 'normal'); doc.text(c.cig || "-", 45, y);
    doc.setFont(undefined, 'bold'); doc.text("CUP:", 100, y); doc.setFont(undefined, 'normal'); doc.text(c.cup || "-", 120, y);

    // BOX FIGURE COINVOLTE CON SPAZIO FIRMA
    y += 15; doc.setFont(undefined, 'bold'); doc.text("FIGURE PROFESSIONALI E FIRME", 15, y);
    doc.line(15, y+2, 195, y+2);
    y += 10;
    
    const figure = [
        {label: "Direttore Lavori:", nome: c.dl, sig: 'DL'},
        {label: "Assistente DL:", nome: c.adl},
        {label: "CSE:", nome: c.cse, sig: 'CSE'},
        {label: "RUP:", nome: c.rup},
        {label: "Assistente RUP:", nome: c.arup},
        {label: "Impresa:", nome: "Vedi Presenze", sig: 'IMP'}
    ];

    figure.forEach(f => {
        doc.setFont(undefined, 'bold'); doc.text(f.label, 15, y);
        doc.setFont(undefined, 'normal'); doc.text(f.nome || "-", 45, y);
        doc.rect(140, y-5, 50, 10); // Casella bianca per firma
        if(f.sig && g['firma_'+f.sig]) {
            doc.addImage(g['firma_'+f.sig], 'PNG', 145, y-4, 40, 8);
        }
        y += 12;
    });

    y += 5; doc.setFont(undefined, 'bold'); doc.text("LAVORAZIONI SVOLTE", 15, y);
    doc.line(15, y+2, 195, y+2);
    y += 10; doc.setFont(undefined, 'normal');
    const lavTxt = doc.splitTextToSize(g.lavorazioni || "Nessuna.", 180);
    doc.text(lavTxt, 15, y);
    
    doc.save(`Giornale_${c.nome}_${activeDate}.pdf`);
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
