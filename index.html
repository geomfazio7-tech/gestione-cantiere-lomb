<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CantieriCloud Pro - Lombardia</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    
    <style>
        :root { --primary: #2d3748; --accent: #4a5568; --bg: #f7fafc; --soft-blue: #ebf8ff; }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; color: #2d3748; }
        .navbar-custom { background: #ffffff; border-bottom: 1px solid #e2e8f0; padding: 0.8rem; }
        .card { border-radius: 12px; border: 1px solid #edf2f7; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        section { display: none; padding-top: 20px; } .active-section { display: block; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; background: #fff; padding: 10px; border-radius: 15px; }
        .cal-day { min-height: 70px; background: #fff; border: 1px solid #edf2f7; border-radius: 8px; padding: 8px; cursor: pointer; }
        .cal-header { font-weight: 800; text-align: center; color: var(--primary); font-size: 0.7rem; text-transform: uppercase; }
        .cal-past { background: #f1f5f9 !important; color: #94a3b8; }
        .cal-today { background: var(--soft-blue) !important; border: 2px solid #3182ce !important; font-weight: bold; color: #2c5282; }
        .cal-future { background: #ffffff; color: #2d3748; }

        .quadrant { min-height: 150px; border-radius: 12px; padding: 10px; margin-bottom: 10px; border: 1px solid #e2e8f0; }
        .q-1 { background: #fff5f5; border-top: 4px solid #feb2b2; } 
        .q-2 { background: #fffaf0; border-top: 4px solid #fbd38d; } 
        .task-item { background: white; border-radius: 6px; padding: 6px 10px; margin-bottom: 6px; font-size: 0.8rem; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        .btn-del-task { color: #e53e3e; cursor: pointer; border: none; background: none; font-size: 1.1rem; padding: 0; }

        .sig-box { border: 2px dashed #cbd5e0; border-radius: 10px; height: 140px; background: #f8fafc; }
        #save-status { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #2d3748; color: white; padding: 8px 20px; border-radius: 30px; display: none; z-index: 9999; }
        .worker-chip { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; border: 1px solid #e2e8f0; margin: 2px; cursor: pointer; background: #fff; }
        .worker-chip.selected { background: #2d3748; color: white; }
    </style>
</head>
<body>

<div id="save-status">💾 Sincronizzazione...</div>

<div id="main-app" style="display:none;">
    <nav class="navbar navbar-light navbar-custom shadow-sm mb-4">
        <div class="container d-flex justify-content-between">
            <span class="navbar-brand fw-bold">CANTIERI<span class="fw-light">CLOUD</span></span>
            <button class="btn btn-sm btn-outline-secondary" onclick="location.reload()">Esci</button>
        </div>
    </nav>

    <div class="container">
        <section id="section-list" class="active-section">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold m-0 text-secondary">Commesse Attive</h4>
                <button class="btn btn-dark btn-sm px-4" onclick="openModaleNuovo()">+ Nuova Commessa</button>
            </div>
            <div id="cantieri-grid" class="row g-4"></div>
        </section>

        <section id="section-calendar">
            <div class="card p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <button class="btn btn-light btn-sm" onclick="showSection('section-list')">←</button>
                    <h5 id="cal-title" class="fw-bold m-0"></h5>
                    <button class="btn btn-outline-dark btn-sm" onclick="editCurrentCommessa()">Impostazioni</button>
                </div>
                <div class="d-flex justify-content-center align-items-center mb-3">
                    <button class="btn btn-link text-dark" onclick="changeMonth(-1)">◀</button>
                    <h6 id="month-display" class="fw-bold text-uppercase m-0 mx-4"></h6>
                    <button class="btn btn-link text-dark" onclick="changeMonth(1)">▶</button>
                </div>
                <div id="calendar-days" class="calendar-grid"></div>
            </div>
        </section>

        <section id="section-giornale">
            <div class="card p-4">
                <div class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-4">
                    <h6 id="g-date-label" class="fw-bold m-0"></h6>
                    <button class="btn-close" onclick="showSection('section-calendar')"></button>
                </div>
                
                <div class="row g-4">
                    <div class="col-lg-4 border-end">
                        <label class="small fw-bold text-primary">1. DATI GIORNALIERI (PDF)</label>
                        <hr class="mt-1">
                        <label class="small fw-bold text-muted">METEO E TEMPERATURE</label>
                        <div class="input-group mb-3">
                            <select id="g-meteo" class="form-select" onchange="autoSave()">
                                <option value="Soleggiato">☀️ Soleggiato</option>
                                <option value="Nuvoloso">☁️ Nuvoloso</option>
                                <option value="Pioggia">🌧️ Pioggia</option>
                                <option value="Vento">💨 Vento</option>
                            </select>
                            <input type="number" id="g-temp" class="form-control" placeholder="°C" onchange="autoSave()">
                        </div>
                        <label class="small fw-bold text-muted">DITTE E MAESTRANZE</label>
                        <select id="sel-ditta" class="form-select form-select-sm mb-3" onchange="addDittaG()"></select>
                        <div id="ditte-presenze" class="mb-3"></div>
                        
                        <button class="btn btn-outline-secondary btn-sm w-100 mb-2" onclick="$('#photo-in').click()">📸 Allegati Foto</button>
                        <input type="file" id="photo-in" capture="environment" accept="image/*" class="d-none" onchange="handlePhotos(this)">
                        <div id="photo-box" class="d-flex flex-wrap gap-2"></div>
                    </div>

                    <div class="col-lg-4 border-end">
                        <label class="small fw-bold text-primary">2. CONTENUTI E FIRME (PDF)</label>
                        <hr class="mt-1">
                        <div class="d-flex justify-content-between mb-2">
                            <label class="small fw-bold text-muted">LAVORAZIONI SVOLTE</label>
                            <button id="btn-lock" class="btn btn-xs btn-outline-dark py-0 px-2" style="font-size:0.6rem" onclick="toggleLock()">SBLOCCA</button>
                        </div>
                        <textarea id="g-lavorazioni" class="form-control mb-3" rows="6" readonly></textarea>
                        
                        <label class="small fw-bold text-muted">FIRME DIGITALI</label>
                        <select id="sel-firma" class="form-select form-select-sm mb-2" onchange="initSig()">
                            <option value="">Seleziona chi deve firmare...</option>
                            <option value="DL">Dir. Lavori</option><option value="ADL">Ass. DL</option>
                            <option value="CSE">CSE</option><option value="RUP">RUP</option>
                            <option value="ARUP">Ass. RUP</option><option value="IMP">Impresa</option>
                        </select>
                        <div id="sig-container" style="display:none" class="mb-3">
                            <div class="sig-box mb-2"><canvas id="sig-canvas"></canvas></div>
                            <div class="d-flex gap-2">
                                <button class="btn btn-sm btn-danger w-50" onclick="clearSig()">🗑️ Pulisci</button>
                                <button class="btn btn-sm btn-dark w-50" onclick="saveSig()">✅ Salva</button>
                            </div>
                        </div>
                        <button class="btn btn-primary w-100 fw-bold py-3 mt-2" onclick="generatePDF()">📄 GENERA GIORNALE PDF</button>
                    </div>

                    <div class="col-lg-4">
                        <label class="small fw-bold text-danger">3. GESTIONE PRIVATA (NON NEL PDF)</label>
                        <hr class="mt-1">
                        <label class="small fw-bold text-muted">NOTE PERSONALI</label>
                        <textarea id="g-memo" class="form-control mb-4" rows="3" placeholder="Appunti privati..." onchange="autoSave()"></textarea>
                        <label class="small fw-bold text-muted">TASK MATRIX</label>
                        <div class="input-group input-group-sm mb-3">
                            <input type="text" id="task-in" class="form-control" placeholder="Nuovo task...">
                            <select id="task-q" class="form-select" style="max-width:85px"><option value="1">Urg</option><option value="2">Imp</option></select>
                            <button class="btn btn-dark" onclick="addTask()">+</button>
                        </div>
                        <div class="row g-2">
                            <div class="col-6"><div class="quadrant q-1" id="q1"></div></div>
                            <div class="col-6"><div class="quadrant q-2" id="q2"></div></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</div>

<div class="modal fade" id="modalC" tabindex="-1"><div class="modal-dialog modal-lg"><div class="modal-content border-0"><div class="modal-body p-4">
    <h6 class="fw-bold mb-3">Configurazione Commessa</h6>
    <div class="row g-2 mb-3">
        <div class="col-12"><input type="text" id="c-ente" class="form-control" placeholder="Stazione Appaltante"></div>
        <div class="col-6"><input type="text" id="c-nome" class="form-control" placeholder="Cantiere"></div>
        <div class="col-6"><input type="text" id="c-oggetto" class="form-control" placeholder="Oggetto"></div>
        <div class="col-6"><input type="text" id="c-cig" class="form-control" placeholder="CIG"></div>
        <div class="col-6"><input type="text" id="c-cup" class="form-control" placeholder="CUP"></div>
        <div class="col-6"><input type="text" id="c-dl" class="form-control" placeholder="Dir. Lavori"></div>
        <div class="col-6"><input type="text" id="c-adl" class="form-control" placeholder="Ass. DL"></div>
        <div class="col-6"><input type="text" id="c-cse" class="form-control" placeholder="CSE"></div>
        <div class="col-6"><input type="text" id="c-rup" class="form-control" placeholder="RUP"></div>
        <div class="col-6"><input type="text" id="c-arup" class="form-control" placeholder="Ass. RUP"></div>
    </div>
    <div id="ana-list" class="mb-3"></div>
    <button class="btn btn-sm btn-outline-dark" onclick="addAnaDitta()">+ Aggiungi Ditta</button>
    <button class="btn btn-dark w-100 mt-3 py-2" onclick="saveC()">SALVA COMMESSA</button>
</div></div></div></div>

<script>
const firebaseConfig = { apiKey: "AIzaSyDCtNOTx-IwS3773jypKl-mW3E51cDxuig", authDomain: "gestionecantierilombardia.firebaseapp.com", projectId: "gestionecantierilombardia", storageBucket: "gestionecantierilombardia.firebasestorage.app", messagingSenderId: "341647926497", appId: "1:341647926497:web:e9eb22c39ded8ea93e83a0" };
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth(), db = firebase.firestore();

let userData = { cantieri: [] }, cIdx = -1, activeDate = "", sigPad, currentMonth = new Date(), tempAna = [];

// Funzioni Sync
auth.onAuthStateChanged(user => { if(user) { $("#auth-section").hide(); $("#pin-section").show(); } });
function handleLogin() { auth.signInWithEmailAndPassword($('#log-email').val(), $('#log-pw').val()); }
function checkPin() { if($('#pin-input').val()==="9731") { $("#pin-section").hide(); $("#main-app").show(); loadDB(); } else alert("PIN Errato"); }
function loadDB() { db.collection('users').doc('archivio_condiviso').get().then(doc => { userData.cantieri = doc.exists ? doc.data().cantieri : []; renderList(); }); }
function renderList() { let h = ''; userData.cantieri.forEach((c, i) => { h += `<div class="col-md-4"><div class="card p-3 shadow-sm" onclick="openC(${i})" style="cursor:pointer"><h6>${c.nome}</h6><small>CIG: ${c.cig || '-'}</small></div></div>`; }); $('#cantieri-grid').html(h); }
function openC(i) { cIdx = i; showSection('section-calendar'); $('#cal-title').text(userData.cantieri[i].nome); renderCal(); }
function showSection(id) { $('section').removeClass('active-section'); $('#'+id).addClass('active-section'); window.scrollTo(0,0); }
function changeMonth(dir) { currentMonth.setMonth(currentMonth.getMonth()+dir); renderCal(); }

function renderCal() {
    const y = currentMonth.getFullYear(), m = currentMonth.getMonth();
    const today = new Date().setHours(0,0,0,0);
    $('#month-display').text(new Intl.DateTimeFormat('it-IT', {month:'long', year:'numeric'}).format(currentMonth));
    const days = new Date(y, m+1, 0).getDate(), start = (new Date(y, m, 1).getDay() + 6) % 7;
    let h = ''; ['L','M','M','G','V','S','D'].forEach(d => h += `<div class="cal-header">${d}</div>`);
    for(let i=0; i<start; i++) h += '<div></div>';
    for(let d=1; d<=days; d++) {
        const loopDate = new Date(y, m, d).setHours(0,0,0,0);
        let cls = loopDate < today ? "cal-past" : (loopDate === today ? "cal-today" : "cal-future");
        h += `<div class="cal-day ${cls}" onclick="openG('${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}')"><b>${d}</b></div>`;
    }
    $('#calendar-days').html(h);
}

function openG(ds) {
    activeDate = ds; const c = userData.cantieri[cIdx];
    $('#g-date-label').text("DATA: " + ds.split('-').reverse().join('/'));
    const g = (c.giornali || {})[ds] || {};
    $('#g-meteo').val(g.meteo || 'Soleggiato'); $('#g-temp').val(g.temp || '');
    $('#g-lavorazioni').val(g.lavorazioni || '').prop('readonly', true);
    $('#btn-lock').text('SBLOCCA'); $('#g-memo').val(g.memo || '');
    $('#sel-firma').val(""); $('#sig-container').hide();
    let sel = $('#sel-ditta').empty().append('<option value="">+ Ditta</option>');
    (c.anagraficaDitte || []).forEach(d => sel.append(`<option value="${d.nome}">${d.nome}</option>`));
    showSection('section-giornale'); renderPresenze(); renderPhotos(); renderTasks();
}

function autoSave() {
    $('#save-status').fadeIn();
    const g = userData.cantieri[cIdx].giornali[activeDate] || (userData.cantieri[cIdx].giornali[activeDate] = {});
    g.meteo = $('#g-meteo').val(); g.temp = $('#g-temp').val(); g.lavorazioni = $('#g-lavorazioni').val(); g.memo = $('#g-memo').val();
    db.collection('users').doc('archivio_condiviso').set({cantieri: userData.cantieri}).then(() => setTimeout(() => $('#save-status').fadeOut(), 800));
}

function toggleLock() {
    const f = $('#g-lavorazioni');
    if(f.prop('readonly')) { f.prop('readonly', false).focus(); $('#btn-lock').text('SALVA'); }
    else { f.prop('readonly', true); $('#btn-lock').text('SBLOCCA'); autoSave(); }
}

function initSig() {
    const r = $('#sel-firma').val(); if(!r) return $('#sig-container').hide();
    $('#sig-container').show();
    const cvs = document.getElementById('sig-canvas');
    setTimeout(() => {
        cvs.width = cvs.offsetWidth; cvs.height = cvs.offsetHeight;
        sigPad = new SignaturePad(cvs);
        const data = userData.cantieri[cIdx].giornali[activeDate]['firma_'+r];
        if(data) sigPad.fromDataURL(data);
    }, 150);
}
function clearSig() { sigPad.clear(); }
function saveSig() { 
    userData.cantieri[cIdx].giornali[activeDate]['firma_'+$('#sel-firma').val()] = sigPad.toDataURL(); 
    autoSave(); alert("Firma Salvata!"); 
}

function handlePhotos(inpt) {
    for(let f of inpt.files) {
        const r = new FileReader(); r.onload = (e) => {
            const img = new Image(); img.src = e.target.result;
            img.onload = () => {
                const c = document.createElement('canvas'); const m = 800; const s = m/img.width;
                c.width = m; c.height = img.height*s; c.getContext('2d').drawImage(img,0,0,c.width,c.height);
                if(!userData.cantieri[cIdx].giornali[activeDate].photos) userData.cantieri[cIdx].giornali[activeDate].photos = [];
                userData.cantieri[cIdx].giornali[activeDate].photos.push(c.toDataURL('image/jpeg', 0.6));
                renderPhotos(); autoSave();
            }
        }; r.readAsDataURL(f);
    }
}
function renderPhotos() { $('#photo-box').empty(); (userData.cantieri[cIdx].giornali[activeDate].photos || []).forEach((p, i) => $('#photo-box').append(`<img src="${p}" style="width:60px;height:60px;object-fit:cover;border-radius:5px" onclick="delPh(${i})">`)); }
function delPh(i) { if(confirm("Eliminare foto?")) { userData.cantieri[cIdx].giornali[activeDate].photos.splice(i,1); renderPhotos(); autoSave(); } }

function addDittaG() {
    const n = $('#sel-ditta').val(); if(!n) return;
    let g = userData.cantieri[cIdx].giornali[activeDate] || (userData.cantieri[cIdx].giornali[activeDate] = {});
    if(!g.ditteVisibili) g.ditteVisibili = [];
    if(!g.ditteVisibili.includes(n)) g.ditteVisibili.push(n);
    renderPresenze(); autoSave();
}
function renderPresenze() {
    const c = userData.cantieri[cIdx], g = c.giornali[activeDate] || {};
    let h = ''; (g.ditteVisibili || []).forEach(nome => {
        const d = (c.anagraficaDitte || []).find(x => x.nome === nome);
        if(d) {
            h += `<div class="bg-white p-2 border rounded mb-2 small"><b>${nome}</b><br>`;
            (d.operai || []).forEach(o => {
                const id = `${o} (${nome})`; const sel = (g.presenti || []).includes(id) ? 'selected' : '';
                h += `<span class="worker-chip ${sel}" onclick="toggleW('${id}')">${o}</span>`;
            }); h += '</div>';
        }
    }); $('#ditte-presenze').html(h);
}
function toggleW(id) {
    let g = userData.cantieri[cIdx].giornali[activeDate]; if(!g.presenti) g.presenti = [];
    g.presenti = g.presenti.includes(id) ? g.presenti.filter(x => x!==id) : [...g.presenti, id];
    renderPresenze(); autoSave();
}

function addTask() {
    const t = $('#task-in').val(); if(!t) return;
    if(!userData.cantieri[cIdx].tasks) userData.cantieri[cIdx].tasks = [];
    userData.cantieri[cIdx].tasks.push({id:Date.now(), text:t, q:$('#task-q').val()});
    $('#task-in').val(''); renderTasks(); autoSave();
}
function renderTasks() {
    $('.quadrant').empty();
    (userData.cantieri[cIdx].tasks || []).forEach(t => {
        $(`#q${t.q}`).append(`<div class="task-item"><span>${t.text}</span><button class="btn-del-task" onclick="confirmDelTask(${t.id})">🗑️</button></div>`);
    });
}
function confirmDelTask(id) { if(confirm("Eliminare?")) { userData.cantieri[cIdx].tasks = userData.cantieri[cIdx].tasks.filter(x => x.id !== id); renderTasks(); autoSave(); } }

function openModaleNuovo() { cIdx = -1; tempAna = []; $('#modalC input').val(''); $('#ana-list').empty(); $('#modalC').modal('show'); }
function editCurrentCommessa() {
    const c = userData.cantieri[cIdx];
    $('#c-ente').val(c.ente || "");
    $('#c-nome').val(c.nome); $('#c-oggetto').val(c.oggetto); $('#c-cig').val(c.cig || ""); $('#c-cup').val(c.cup || "");
    $('#c-dl').val(c.dl); $('#c-adl').val(c.adl || ""); $('#c-cse').val(c.cse); $('#c-rup').val(c.rup); $('#c-arup').val(c.arup || "");
    tempAna = JSON.parse(JSON.stringify(c.anagraficaDitte || [])); renderAna(); $('#modalC').modal('show');
}
function addAnaDitta() { const n = prompt("Ditta:"); if(n) { tempAna.push({nome:n.toUpperCase(), operai:[]}); renderAna(); } }
function addAnaW(i) { const n = prompt("Operaio:"); if(n) { tempAna[i].operai.push(n.toUpperCase()); renderAna(); } }
function renderAna() { let h = ''; tempAna.forEach((d, i) => { h += `<div class="p-2 border rounded mb-2 small bg-light"><b>${d.nome}</b> <button class="btn btn-link btn-sm" onclick="addAnaW(${i})">+ operaio</button><br>`; (d.operai || []).forEach(o => h += `<span class="badge bg-secondary me-1">${o}</span>`); h += '</div>'; }); $('#ana-list').html(h); }
function saveC() {
    const d = { ente: $('#c-ente').val().toUpperCase(), nome: $('#c-nome').val().toUpperCase(), oggetto: $('#c-oggetto').val(), cig: $('#c-cig').val(), cup: $('#c-cup').val(), dl: $('#c-dl').val(), adl: $('#c-adl').val(), cse: $('#c-cse').val(), rup: $('#c-rup').val(), arup: $('#c-arup').val(), anagraficaDitte: tempAna, giornali: cIdx===-1 ? {} : (userData.cantieri[cIdx].giornali || {}), tasks: cIdx===-1 ? [] : (userData.cantieri[cIdx].tasks || []) };
    if(cIdx===-1) userData.cantieri.push(d); else userData.cantieri[cIdx] = d;
    db.collection('users').doc('archivio_condiviso').set({cantieri: userData.cantieri}).then(() => { $('#modalC').modal('hide'); renderList(); });
}

// --- GENERAZIONE PDF ---
async function generatePDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const c = userData.cantieri[cIdx];
    const g = c.giornali[activeDate] || {};
    const mainColor = [45, 55, 72];

    // Header
    doc.setFillColor(mainColor[0], mainColor[1], mainColor[2]);
    doc.rect(0, 0, 210, 40, 'F');
    doc.setTextColor(255);
    doc.setFontSize(22); doc.text("GIORNALE DI CANTIERE", 105, 20, { align: 'center' });
    doc.setFontSize(10); doc.text(`${activeDate.split('-').reverse().join('/')} | Meteo: ${g.meteo || '-'} | Temp: ${g.temp || '--'}°C`, 105, 30, { align: 'center' });

    let y = 50; doc.setTextColor(0); doc.setDrawColor(mainColor[0], mainColor[1], mainColor[2]); doc.setLineWidth(0.5);

    // Stazione Appaltante
    doc.setFontSize(11); doc.setFont("helvetica", "bold");
    doc.text("STAZIONE APPALTANTE:", 15, y); doc.setFont("helvetica", "normal");
    doc.text(c.ente || "-", 65, y); y += 8;

    // Cantiere
    doc.setFont("helvetica", "bold"); doc.text("CANTIERE:", 15, y);
    doc.setFont("helvetica", "normal"); doc.text(c.nome || "-", 65, y); y += 8;

    // Oggetto
    doc.setFont("helvetica", "bold"); doc.text("OGGETTO:", 15, y);
    doc.setFont("helvetica", "normal"); const objL = doc.splitTextToSize(c.oggetto || "-", 130);
